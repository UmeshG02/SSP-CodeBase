version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ssp-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sspcodebase
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ssp-network

  redis:
    image: redis:7-alpine
    container_name: ssp-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    networks:
      - ssp-network

volumes:
  pgdata:
  redisdata:

networks:
  ssp-network:
    driver: bridge
